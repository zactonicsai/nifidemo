# =============================================================================
# FreshMart Grocery — Apache NiFi Demo Stack
# =============================================================================
# Full enterprise data pipeline: POS → Kafka → NiFi → PostgreSQL + SQS/SNS
# All services use the latest stable images as of May 2026.
# =============================================================================

services:

  # ── Apache NiFi (Data Pipeline Engine) ─────────────────────────────────────
  # Drag-and-drop visual ETL. Hosts the FreshMart workflow definitions.
  nifi:
    image: apache/nifi:2.7.0
    container_name: freshmart-nifi
    ports:
      - "8443:8443"        # NiFi web UI (HTTPS)
    environment:
      SINGLE_USER_CREDENTIALS_USERNAME: admin
      SINGLE_USER_CREDENTIALS_PASSWORD: FreshMart2024Secret!
      NIFI_WEB_HTTPS_PORT: 8443
      NIFI_WEB_PROXY_HOST: "localhost:8443,nifi:8443"
      NIFI_JVM_HEAP_INIT: 1g
      NIFI_JVM_HEAP_MAX: 2g
    volumes:
      - nifi-data:/opt/nifi/nifi-current/data
      - nifi-logs:/opt/nifi/nifi-current/logs
      - nifi-conf:/opt/nifi/nifi-current/conf
      - ./flows:/opt/nifi/nifi-current/flow-archive
      - ./vendor-data:/sftp/vendor/incoming      # vendor CSV drop folder
      - ./static-data:/opt/freshmart/static      # static catalog/lookup data
      - ./test-data:/opt/freshmart/test-data     # sample test events
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      localstack:
        condition: service_started
    networks: [freshmart]
    healthcheck:
      test: ["CMD", "curl", "-f", "-k", "https://localhost:8443/nifi-api/system-diagnostics"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s

  # ── Apache Kafka (Event Streaming, KRaft mode — no ZooKeeper) ──────────────
  # Latest Kafka runs in KRaft mode (Kafka-Raft) — ZooKeeper is no longer required.
  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: freshmart-kafka
    ports:
      - "9092:9092"        # external client port (host → container)
    environment:
      # KRaft mode: this single node is both controller and broker
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_MESSAGE_MAX_BYTES: 10485760        # 10 MB max message
      CLUSTER_ID: "FreshMart-KRaft-Cluster-01"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks: [freshmart]
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:29092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Kafka Topic Bootstrapper (one-shot init container) ─────────────────────
  # Creates all FreshMart topics on first boot, then exits.
  kafka-init:
    image: confluentinc/cp-kafka:7.7.1
    container_name: freshmart-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    networks: [freshmart]
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "Bootstrapping FreshMart Kafka topics..."
        for topic in pos-sales vendor-deliveries customer-feedback \
                     reorder-alerts planogram-updates product-recalls \
                     hr-notifications inventory-updates dead-letter-queue; do
          kafka-topics --bootstrap-server kafka:29092 \
            --create --if-not-exists \
            --topic "$$topic" --partitions 3 --replication-factor 1
        done
        echo "Topics created:"
        kafka-topics --bootstrap-server kafka:29092 --list

  # ── PostgreSQL (FreshMart Data Warehouse) ──────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: freshmart-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: freshmart_dw
      POSTGRES_USER: nifi
      POSTGRES_PASSWORD: nifi_secret
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./sql/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    networks: [freshmart]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nifi -d freshmart_dw"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── LocalStack (AWS SQS + SNS + S3 emulation) ──────────────────────────────
  localstack:
    image: localstack/localstack:3.8
    container_name: freshmart-localstack
    ports:
      - "4566:4566"        # unified AWS endpoint
    environment:
      SERVICES: "sqs,sns,s3"
      DEBUG: "0"
      DEFAULT_REGION: "us-east-1"
      PERSISTENCE: "1"
    volumes:
      - localstack-data:/var/lib/localstack
      - ./scripts/localstack-init.sh:/etc/localstack/init/ready.d/init.sh:ro
    networks: [freshmart]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Go Validator Microservice (NiFi calls this for schema validation) ──────
  go-validator:
    build: ./go-validator
    container_name: freshmart-go-validator
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: freshmart_dw
      DB_USER: nifi
      DB_PASS: nifi_secret
    depends_on:
      postgres:
        condition: service_healthy
    networks: [freshmart]
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 15s
      retries: 5

  # ── POS Simulator (HTTP endpoint that NiFi ListenHTTP receives from) ───────
  # Acts as the test target: forwards events to NiFi and Kafka.
  pos-simulator:
    build: ./pos-simulator
    container_name: freshmart-pos-simulator
    ports:
      - "9090:9090"        # POS event ingestion endpoint
    environment:
      KAFKA_BROKERS: "kafka:29092"
      NIFI_ENDPOINT: "https://nifi:8443"
      POSTGRES_HOST: postgres
      POSTGRES_USER: nifi
      POSTGRES_PASS: nifi_secret
      POSTGRES_DB: freshmart_dw
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks: [freshmart]

  # ── Dashboard (HTML + Tailwind + JS — IBM blue on white theme) ─────────────
  # The control panel users open in their browser to fire events and watch
  # the pipeline come alive end-to-end.
  dashboard:
    image: nginx:1.27-alpine
    container_name: freshmart-dashboard
    ports:
      - "8000:80"
    volumes:
      - ./dashboard:/usr/share/nginx/html:ro
      - ./dashboard/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - pos-simulator
    networks: [freshmart]

  # ── Kafka UI (Web UI to inspect topics, brokers, messages) ─────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: freshmart-kafka-ui
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: freshmart
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      kafka:
        condition: service_healthy
    networks: [freshmart]

  # ── pgAdmin (Web UI for PostgreSQL) ────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: freshmart-pgadmin
    ports:
      - "8082:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@freshmart.local
      PGADMIN_DEFAULT_PASSWORD: FreshMart2024!
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./scripts/pgadmin-servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks: [freshmart]

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  freshmart:
    driver: bridge
    name: freshmart-net

# ── Persistent Volumes ───────────────────────────────────────────────────────
volumes:
  nifi-data:
  nifi-logs:
  nifi-conf:
  kafka-data:
  pg-data:
  localstack-data:
  pgadmin-data:
