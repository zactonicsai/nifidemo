# The Ansible CONTROLLER container is our target. It runs the playbooks
# locally, talks to the Docker engine via the mounted socket, and reaches
# the other services by their Docker network DNS names.

[docker_host]
controller ansible_connection=local ansible_host=localhost

[zookeeper:children]
docker_host

[kafka:children]
docker_host

[elasticsearch:children]
docker_host

[nifi:children]
docker_host

[stack:children]
zookeeper
kafka
elasticsearch
nifi
