# The Docker host IS our target. Ansible runs against localhost
# and uses the community.docker collection to drive containers.
[docker_host]
localhost ansible_connection=local

# Logical service groups (all map to the same physical host here).
# In real environments these would be separate machines.
[zookeeper:children]
docker_host

[kafka:children]
docker_host

[elasticsearch:children]
docker_host

[nifi:children]
docker_host

[stack:children]
zookeeper
kafka
elasticsearch
nifi
