---
# 00-bootstrap.yml — bring the stack up cleanly.
#
# What it does:
#   1. Verifies prerequisites (docker, compose plugin) exist
#   2. Creates host log/config dirs with correct perms
#   3. Renders any required override config from templates
#   4. Runs `docker compose up -d`
#   5. Waits for every service to report healthy
#
# Run: ansible-playbook playbooks/00-bootstrap.yml

- name: Bootstrap the Zookeeper/Kafka/ES/NiFi stack
  hosts: docker_host
  gather_facts: true
  tags: [bootstrap]

  tasks:
    # ----- 1. Prerequisites -----
    - name: Check docker is on PATH
      ansible.builtin.command: docker --version
      register: docker_version
      changed_when: false
      failed_when: docker_version.rc != 0

    - name: Check docker compose plugin is available
      ansible.builtin.command: docker compose version
      register: compose_version
      changed_when: false
      failed_when: compose_version.rc != 0

    - name: Show detected versions
      ansible.builtin.debug:
        msg:
          - "{{ docker_version.stdout }}"
          - "{{ compose_version.stdout }}"

    # ----- 2. Host directories -----
    - name: Ensure log directories exist with permissive ownership
      ansible.builtin.file:
        path: "{{ host_log_root }}/{{ item.name }}"
        state: directory
        mode: '0777'        # containers run as different UIDs; permissive for tutorial
      loop: "{{ services }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Ensure config override directories exist
      ansible.builtin.file:
        path: "{{ host_config_root }}/{{ item.name }}"
        state: directory
        mode: '0755'
      loop: "{{ services }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Ensure backup and archive roots exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - "{{ backup_root }}"
        - "{{ archive_root }}"

    # ----- 3. Start the stack -----
    - name: Run docker compose up
      community.docker.docker_compose_v2:
        project_src: "{{ compose_dir }}"
        state: present
        wait: true
        wait_timeout: 300
      register: compose_result

    - name: Summarize compose result
      ansible.builtin.debug:
        msg: "Containers managed: {{ compose_result.containers | map(attribute='Name') | list }}"

    # ----- 4. Wait for each service's healthcheck to pass -----
    - name: Wait for each service to become healthy
      ansible.builtin.command: >
        docker inspect -f '{{ "{{" }}.State.Health.Status{{ "}}" }}' {{ item.container }}
      register: health
      retries: 30
      delay: 5
      until: health.stdout == "healthy"
      changed_when: false
      loop: "{{ services }}"
      loop_control:
        label: "{{ item.name }}"

    - name: All services healthy
      ansible.builtin.debug:
        msg: "✓ Stack is up. Try: ansible-playbook playbooks/01-health-check.yml"
