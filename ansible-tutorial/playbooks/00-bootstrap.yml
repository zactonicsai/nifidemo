---
# 00-bootstrap.yml — post-compose-up bootstrap.
#
# Assumes the stack is already running (you've run `docker compose up -d`
# from the host). This playbook:
#   1. Verifies docker socket + CLI are usable from inside the controller
#   2. Creates per-service backup/archive subdirs
#   3. Waits for every service's container healthcheck to report 'healthy'
#
# Run from inside the controller:
#   ansible-playbook playbooks/00-bootstrap.yml

- name: Bootstrap (post-compose-up) checks and directories
  hosts: docker_host
  gather_facts: true
  tags: [bootstrap]

  tasks:
    # ----- 1. Verify controller has what it needs -----
    - name: Check docker CLI is available
      ansible.builtin.command: docker --version
      register: docker_version
      changed_when: false

    - name: Check docker socket is reachable
      ansible.builtin.command: docker info
      register: docker_info
      changed_when: false
      failed_when: docker_info.rc != 0

    - name: Check ansible version
      ansible.builtin.command: ansible --version
      register: ansible_version
      changed_when: false

    - name: Show environment
      ansible.builtin.debug:
        msg:
          - "{{ docker_version.stdout }}"
          - "{{ ansible_version.stdout_lines[0] }}"

    # ----- 2. Make sure host-side dirs exist -----
    - name: Ensure log dirs exist (in case compose was never started)
      ansible.builtin.file:
        path: "{{ host_log_root }}/{{ item.name }}"
        state: directory
        mode: '0777'
      loop: "{{ services }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Ensure config dirs exist
      ansible.builtin.file:
        path: "{{ host_config_root }}/{{ item.name }}"
        state: directory
        mode: '0755'
      loop: "{{ services }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Ensure backup and archive dirs exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - "{{ backup_root }}"
        - "{{ archive_root }}"

    # ----- 3. Wait for each service's healthcheck -----
    - name: Wait for each service to be healthy
      ansible.builtin.command: >
        docker inspect -f '{{ "{{" }}.State.Health.Status{{ "}}" }}' {{ item.container }}
      register: health
      retries: 30
      delay: 5
      until: health.stdout == "healthy"
      changed_when: false
      loop: "{{ services }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Bootstrap complete
      ansible.builtin.debug:
        msg: "All services healthy. Try: ansible-playbook playbooks/01-health-check.yml"
