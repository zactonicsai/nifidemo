---
# Shared variables for every play.
# All paths use the controller's view of the filesystem (it runs inside its
# own container with the project bind-mounted at /workspace).

# Project layout
project_dir:  "/workspace"
compose_dir:  "/workspace/docker"
compose_file: "/workspace/docker/docker-compose.yml"

# Host-side directories (controller sees these via the bind mount)
host_log_root:    "/workspace/docker/logs"
host_config_root: "/workspace/docker/config"
backup_root:      "/workspace/backups"
archive_root:     "/workspace/archive"

# Retention
retention_days: 14
disk_warn_pct: 80
log_rotate_size_mb: 50
log_archive_age_days: 7

# Service catalog.
# host_url uses Docker network DNS — the controller is on the same `stack`
# network as the services, so `kafka`, `elasticsearch`, etc. resolve to the
# right containers. NEVER use localhost from inside the controller; that
# would loop back to the controller itself, not the target service.
services:
  - name: zookeeper
    container: zookeeper
    log_dir: "/workspace/docker/logs/zookeeper"
    log_glob: "*.log"
    health_url: ""
    health_port: 2181
    health_cmd: "echo ruok | nc -w 2 zookeeper 2181"
    health_cmd_expect: "imok"

  - name: kafka
    container: kafka
    log_dir: "/workspace/docker/logs/kafka"
    log_glob: "*.log"
    health_url: ""
    health_port: 9092
    health_cmd: "docker exec kafka kafka-broker-api-versions --bootstrap-server localhost:9092"
    health_cmd_expect: "id: 1"

  - name: elasticsearch
    container: elasticsearch
    log_dir: "/workspace/docker/logs/elasticsearch"
    log_glob: "*.log"
    health_url: "http://elasticsearch:9200/_cluster/health"
    health_port: 9200
    health_cmd: ""
    health_cmd_expect: ""

  - name: nifi
    container: nifi
    log_dir: "/workspace/docker/logs/nifi"
    log_glob: "*.log"
    health_url: "http://nifi:8080/nifi-api/system-diagnostics"
    health_port: 8080
    health_cmd: ""
    health_cmd_expect: ""
